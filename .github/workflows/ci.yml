name: CI Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'cicd/task-1/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'cicd/task-1/**'
      - '.github/workflows/ci.yml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cicd/task-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest flake8

      - name: Lint with flake8
        run: flake8 . --count --max-line-length=100 --statistics

      - name: Run unit tests
        run: pytest -v

      - name: Run the script
        run: python calculator.py